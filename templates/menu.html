<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger King Menu | Swiggy Clone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='menu.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="left-nav">
                <a href="index.html"><img
                        src="https://upload.wikimedia.org/wikipedia/en/thumb/1/12/Swiggy_logo.svg/1200px-Swiggy_logo.svg.png"
                        alt="Swiggy Logo" class="logo"></a>
            </div>
            <nav class="right-nav">
                <ul>
                    <li><i class="fa-solid fa-magnifying-glass"></i> Search</li>
                    <li id="orderBtn"><i class="fa-solid fa-cart-shopping" ></i> Orders</li>
                    <li id="cartBtn"><i class="fa-solid fa-cart-shopping" ></i> Cart</li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="menu-container">
        <nav class="breadcrumbs">
            Home / Hyderabad / <span>Burger King</span>
        </nav>

        <section class="res-header">
            <div class="res-info" id="res_info">
                <h1>Burger King</h1>
                <p class="res-location">Banjara Hills, 2.5 km</p>
            </div>
            <!-- <div class="res-rating-card">
                <span class="rating-top"><i class="fa-solid fa-star"></i> 4.2</span>
                <hr>
                <span class="rating-bottom">10K+ ratings</span>
            </div> -->
        </section>

        <div class="res-delivery-info">
            <span><i class="fa-solid fa-clock"></i> 25-30 MINS</span>
            <span><i class="fa-solid fa-indian-rupee-sign"></i> ₹350 for two</span>
        </div>

        <hr class="divider">

        <section class="menu-section" id="menu_container">

            
        </section>
    </main>
<script src="{{ url_for('static', filename='menu.js') }}"></script>
</body>

</html>
