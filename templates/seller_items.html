<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger King Menu | Swiggy Clone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='seller_items.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
        <header>
            Seller Dashboard
        </header>



    <main class="menu-container">
        <nav class="breadcrumbs">
            Home / Hyderabad / <span id="res_name">Burger King</span>
        </nav>

        <section class="res-header">
            <div class="res-info" id="res_info">
                <h1 id="res_name_heading">Burger King</h1>
                <p class="res-location">Banjara Hills, 2.5 km</p>
            </div>
            <!-- <div class="res-rating-card">
                <span class="rating-top"><i class="fa-solid fa-star"></i> 4.2</span>
                <hr>
                <span class="rating-bottom">10K+ ratings</span>
            </div> -->
        </section>

        <!-- <div class="res-delivery-info">
            <span><i class="fa-solid fa-clock"></i> 25-30 MINS</span>
            <span><i class="fa-solid fa-indian-rupee-sign"></i> ₹350 for two</span>
        </div> -->

        <hr class="divider">

        <section class="menu-section" id="menu_container">


        </section>
        <div id="updateModal" class="modal hidden">
  <div class="modal-content">
    <h2>Update Item</h2>

    <input type="text" id="update_name" placeholder="Item Name">
    <input type="number" id="update_price" placeholder="Price">
    <input type="number" id="update_qty" placeholder="Quantity">

    <button id="saveUpdate">Save</button>
    <button id="closeModal">Cancel</button>
  </div>
</div>
    </main>

    <div class="container">

        <!-- Add Item Form -->
        <div class="form-box">
            <h2 class="new_item_heading">Add New Item</h2>
            <input type="text" id="name" placeholder="Item Name">
            <input type="number" id="price" placeholder="Price">
            <input type="text" id="qty" placeholder="Quantity">
            <!-- <input type="text" id="image" placeholder="Image URL"> -->
            <button id="addItem">Add Item</button>
        </div>

        <!-- Menu Items -->
        <div class="menu" id="menu"></div>

    </div>
    <script src="{{ url_for('static', filename='seller_items.js') }}"></script>
</body>

</html>
