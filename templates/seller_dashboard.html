<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f172a;
  color: white;
  padding: 20px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 1.8rem;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

/* Card */
.card {
  background: linear-gradient(145deg, #1e293b, #020617);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
  transform: translateY(-5px);
}

/* Item Name */
.item-name {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 10px;
}

/* Stock */
.stock {
  font-size: 1rem;
  margin-bottom: 10px;
}

/* Status */
.status {
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 0.8rem;
  display: inline-block;
}

.in-stock {
  background: #16a34a;
}

.low-stock {
  background: #f59e0b;
}

.out-stock {
  background: #dc2626;
}

/* Button */
.btn {
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
  font-size: 0.85rem;
}

.btn:hover {
  background: #0ea5e9;
}
</style>
</head>

<body>

<div class="header">
  <h1>Inventory Dashboard 📦</h1>
</div>

<div class="grid" id="inventoryGrid">
  <!-- Items will load here -->
</div>

<script>
const resId = localStorage.getItem("res_id");

async function loadInventory() {
  const res = await fetch("/seller/inventory", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ res_id: resId })
  });

  const data = await res.json();
  const grid = document.getElementById("inventoryGrid");

  grid.innerHTML = "";

  data.items.forEach(item => {
    let statusClass = "in-stock";
    let statusText = "In Stock";

    if (item.qty <= 0) {
      statusClass = "out-stock";
      statusText = "Out of Stock";
    } else if (item.qty < 5) {
      statusClass = "low-stock";
      statusText = "Low Stock";
    }

    const card = `
      <div class="card">
        <div class="item-name">${item.name}</div>

        <div class="stock">Remaining: ${item.qty}</div>

        <div class="status ${statusClass}">
          ${statusText}
        </div>

        <button class="btn" onclick="updateStock('${item.id}')">
          Update Stock
        </button>
      </div>
    `;

    grid.innerHTML += card;
  });
}

function updateStock(itemId) {
  const newQty = prompt("Enter new quantity:");

  if (newQty === null) return;

  fetch("/seller/update_stock", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      item_id: itemId,
      qty: parseInt(newQty)
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      loadInventory();
    }
  });
}

loadInventory();
</script>

</body>
</html>
